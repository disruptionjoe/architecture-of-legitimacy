# Architecture of Legitimacy lane manifest.
#
# This file is the repository's authoritative declaration of its durable
# execution containers. It holds definitions, owner control state, and pointers
# to authoritative work. It never stores run history, derived health,
# automation cadence, or a duplicate backlog.
#
# CANON PRECEDENCE. This file is a POINTER to governance/CHARTER.md, never a
# source. Where the two differ, the charter is right by construction and this
# file is corrected against it. An earlier revision was rendered from the
# CapacityOS WI-078 disposition manifest rather than authored from the charter:
# it set charter_ref to AGENTS.md (the charter is governance/CHARTER.md) and set
# Lane 1 to "Contribution architecture", the protocol-stack incumbent a
# five-scientist Condorcet council scored 0-6, last of seven. Rendering an
# in-repo artifact from an out-of-repo summary is not neutral transcription; it
# substitutes the portfolio's paraphrase for repo canon, and the paraphrase
# inherits this repository's authority the moment it lands here.
#
# The North Star is ONE statement with two components. The blockbuster component
# is what Lane 1 forces or falsifies. The agent-capability component is not a
# lane, never commissions an experiment, and only explains the choice of target
# and constrains method.

lane_contract_version: '1.0'
manifest_revision: 2
owner:
  owner_id: architecture-of-legitimacy
  display_name: Architecture of Legitimacy
  scope_type: repository
  charter_ref: governance/CHARTER.md
  governance_refs:
  - AGENTS.md
  authoritative_state_refs:
  - governance/CHARTER.md
  - CLAIMS.md
  - LEGITIMACY-SCHEMA.md
  - THREAT-MODEL.md
  - PROTOCOL-STACK.md
  - GOVERNANCE.md
  charter_north_star_blockbuster: 'There are findable conditions under which enduring legitimacy
    is constructible in a positive-sum game: conditions that make corruption and collusion
    nonviable rather than merely punished, and that hold because of what the enforcement substrate
    makes possible rather than what any population currently prefers. (governance/CHARTER.md,
    North Star > Blockbuster component.) Lane 1 is its primary operational expression.'
  charter_north_star_agent_capability: 'Whether research agents can perform adversarial self-application:
    run the instrument on the institution running the instrument and return a verdict its
    host did not want, without flattering the host and without reaching for the host''s own
    ratified escape hatch. (governance/CHARTER.md, North Star > Agent-capability component.)
    This is NOT a lane and may not commission work. It explains why this repository chases
    this blockbuster: no other repository in the portfolio is its own specimen, and this hazard
    is preferring a SELF, which blinding cannot fix. It constrains method via governance/CHARTER.md
    Self-Application Discipline. Neither component is evidence for the other.'
  kill_condition_ref: governance/CHARTER.md#kill-condition
lanes:
- id: '1'
  label: Lane 1
  ordinal: 1
  kind: progress
  title: Legitimacy feasibility, substrate-bounded
  north_star: true
  purpose: 'Force or falsify the charter''s blockbuster component: that there are findable
    conditions under which enduring legitimacy is constructible in a positive-sum game, making
    corruption and collusion nonviable rather than merely punished, and holding because of
    what the enforcement substrate makes possible rather than what any population currently
    prefers. The load-bearing words are nonviable (not detected-and-punished) and findable
    (discoverable by method, not stipulated by a designer).'
  purpose_type: north_star
  relation_to_lane_1: primary_operational_expression
  environment: The owner's governed repository, its declared operating interfaces, and its
    authoritative work surfaces.
  beneficiaries: &id002
  - Joe
  - the owner's declared users
  - authorized downstream consumers
  admission: &id003
    posture: governed
    authority_ref: AGENTS.md
  execution_posture: automation_eligible
  health_profile: run_observed
  directed_flow: null
  authoritative_work_refs: &id004
  - GOVERNANCE.md
  - LEGITIMACY-SCHEMA.md
  - RESEARCH-AGENDA.md
  - ROADMAP.md
  - TESTS.md
  durable_outputs: &id001
  - Owner-governed artifacts, decisions, and state transitions that directly advance or test
    the named Lane 1 purpose.
  eligible_outputs: *id001
  forbidden_outputs: &id006
  - another owner's canon or authoritative state
  - automation enrollment, activation, cadence, trigger, or scheduler state
  - an external action without exact direct-chat authorization
  control:
    state: active
    in_flight_policy: continue_current
    control_revision: 2
    scheduling_preference: normal
    changed_at: '2026-07-16T00:00:00-05:00'
    changed_by: Joe direct chat, 2026-07-16
    authority_ref: Joe direct chat, 2026-07-16 charter ratification
    reason: Lane 1 re-pointed at the ratified charter blockbuster component. The rendered
      purpose (contribution architecture) was the protocol-stack incumbent, which a five-scientist
      Condorcet council scored 0-6, last of seven. It names no kill condition, which is why
      it lost.
  provenance:
    revision: 2
    approved_at: '2026-07-16T00:00:00-05:00'
    approved_by: Joe direct chat, 2026-07-16
  slug: LEGITIMACY-FEASIBILITY
  method_constraints_ref: governance/CHARTER.md#self-application-discipline
  method_constraints_note: Self-Application Discipline is binding on every run in this lane
    and derives from the North Star agent-capability component, not from a lane of its own.
    Measure the host first; an adverse finding about this repository is a first-class result;
    no rule-change under adverse measurement.
  falsification_refs:
  - governance/CHARTER.md#kill-condition
  research_sequence:
  - 'First experiment: the git Non-Capture measurement. Does capture cost rise with accumulated
    legitimacy because of git properties, or because of founder decisions? Runnable alone;
    can kill this repository unilaterally (K1).'
  - 'Second experiment: the Interval Sweep, the seam experiment with Continuity Ledger. This
    repository owns the legitimacy half and consumes the substrate half as a frozen packet
    (P1).'
- id: '2'
