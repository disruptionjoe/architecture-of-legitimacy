name: Contribution proposal
description: Propose a research, formalization, protocol design, review, synthesis, implementation, or maintenance contribution.
title: "[Contribution]: "
labels: ["contribution"]
body:
  - type: dropdown
    id: contribution_type
    attributes:
      label: Contribution type
      options:
        - research
        - formalization
        - protocol design
        - review
        - synthesis
        - implementation
        - maintenance
    validations:
      required: true
  - type: textarea
    id: target
    attributes:
      label: Target
      description: Which claim, test, document, or research question does this address?
    validations:
      required: true
  - type: textarea
    id: contribution
    attributes:
      label: Contribution
      description: What are you adding or changing?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: How does this improve clarity, rigor, legitimacy, capture resistance, or contributor usability?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reasoning
      description: What sources, examples, models, or arguments support it?
    validations:
      required: false
  - type: textarea
    id: risks
    attributes:
      label: Failure or risk
      description: What might be wrong with this contribution?
    validations:
      required: false
  - type: textarea
    id: loss_or_deferred_value
    attributes:
      label: Loss or deferred value
      description: What useful value might be lost if this is revised, narrowed, or not accepted as-is?
    validations:
      required: false
